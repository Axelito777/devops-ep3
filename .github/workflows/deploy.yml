name: CI/CD — Build, Push to ECR & Deploy to EKS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: devops-ep3

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build & test all modules
        run: mvn verify --batch-mode --no-transfer-progress

      - name: SonarQube Analysis & Quality Gate (IE6)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            --batch-mode \
            --no-transfer-progress \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7

  # ── 2. Build & Push Docker images to ECR ────────────────────────────────────
  docker-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.ecr-login.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ms-eureka
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ms-eureka/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ms-eureka:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/ms-eureka:latest
          cache-from: type=gha,scope=ms-eureka
          cache-to: type=gha,mode=max,scope=ms-eureka

      - name: Build & push ms-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ms-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ms-gateway:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/ms-gateway:latest
          cache-from: type=gha,scope=ms-gateway
          cache-to: type=gha,mode=max,scope=ms-gateway

      - name: Build & push ms-auth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ms-auth/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ms-auth:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/ms-auth:latest
          cache-from: type=gha,scope=ms-auth
          cache-to: type=gha,mode=max,scope=ms-auth

      - name: Build & push ms-clientes
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ms-clientes/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ms-clientes:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/ms-clientes:latest
          cache-from: type=gha,scope=ms-clientes
          cache-to: type=gha,mode=max,scope=ms-clientes

      - name: Build & push ms-inventario
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ms-inventario/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ms-inventario:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/ms-inventario:latest
          cache-from: type=gha,scope=ms-inventario
          cache-to: type=gha,mode=max,scope=ms-inventario

      - name: Build & push ms-pedidos
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ms-pedidos/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/ms-pedidos:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/ms-pedidos:latest
          cache-from: type=gha,scope=ms-pedidos
          cache-to: type=gha,mode=max,scope=ms-pedidos

  # ── 3. Deploy to EKS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Apply namespace and base config
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/configmap.yml

      - name: Apply secrets (from GitHub Secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_USERNAME: ${{ secrets.SUPABASE_USERNAME }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        run: envsubst < k8s/secrets.yml | kubectl apply -f -

      - name: Deploy microservices
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ needs.docker-push.outputs.image-tag }}
        run: |
          for svc in ms-eureka ms-gateway ms-auth ms-clientes ms-inventario ms-pedidos; do
            envsubst < "k8s/${svc}.yml" | kubectl apply -f -
          done

      - name: Wait for rollout
        run: |
          for svc in ms-eureka ms-gateway ms-auth ms-clientes ms-inventario ms-pedidos; do
            kubectl rollout status deployment/"${svc}" -n smartlogix --timeout=300s
          done

      - name: Show deployed services
        run: |
          kubectl get deployments,services,hpa -n smartlogix
