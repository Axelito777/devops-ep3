server.port=8080
spring.application.name=ms-gateway

spring.cloud.gateway.routes[0].id=ms-auth
spring.cloud.gateway.routes[0].uri=lb://ms-auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=ms-clientes
spring.cloud.gateway.routes[1].uri=lb://ms-clientes
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/clientes/**

spring.cloud.gateway.routes[2].id=ms-inventario
spring.cloud.gateway.routes[2].uri=lb://ms-inventario
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/inventario/**

spring.cloud.gateway.routes[3].id=ms-pedidos
spring.cloud.gateway.routes[3].uri=lb://ms-pedidos
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pedidos/**

spring.cloud.gateway.routes[4].id=ms-envios
spring.cloud.gateway.routes[4].uri=lb://ms-envios
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/envios/**

spring.cloud.gateway.routes[5].id=ms-proveedores
spring.cloud.gateway.routes[5].uri=lb://ms-proveedores
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/proveedores/**

spring.cloud.gateway.routes[6].id=ms-pagos
spring.cloud.gateway.routes[6].uri=lb://ms-pagos
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/pagos/**

spring.cloud.gateway.routes[7].id=ms-notificaciones
spring.cloud.gateway.routes[7].uri=lb://ms-notificaciones
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notificaciones/**

spring.cloud.gateway.routes[8].id=ms-reportes
spring.cloud.gateway.routes[8].uri=lb://ms-reportes
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/reportes/**

jwt.secret=${JWT_SECRET}

spring.cloud.gateway.discovery.locator.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true