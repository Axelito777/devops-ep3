apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-eureka
  namespace: smartlogix
  labels:
    app: ms-eureka
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-eureka
  template:
    metadata:
      labels:
        app: ms-eureka
    spec:
      containers:
        - name: ms-eureka
          image: ${ECR_REGISTRY}/ms-eureka:${IMAGE_TAG}
          ports:
            - containerPort: 8761
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ms-eureka
  namespace: smartlogix
spec:
  type: LoadBalancer
  selector:
    app: ms-eureka
  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-eureka-hpa
  namespace: smartlogix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-eureka
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
