apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-clientes
  namespace: smartlogix
  labels:
    app: ms-clientes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-clientes
  template:
    metadata:
      labels:
        app: ms-clientes
    spec:
      containers:
        - name: ms-clientes
          image: ${ECR_REGISTRY}/ms-clientes:${IMAGE_TAG}
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: smartlogix-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: smartlogix-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartlogix-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartlogix-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartlogix-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartlogix-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartlogix-config
                  key: REDIS_PORT
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 50
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ms-clientes
  namespace: smartlogix
spec:
  type: ClusterIP
  selector:
    app: ms-clientes
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-clientes-hpa
  namespace: smartlogix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-clientes
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
